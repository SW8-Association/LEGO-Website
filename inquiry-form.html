<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="inquiry-form.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />hh
  </head>
  <body>
    <div class="container">
      <div class="form-card">
        <h1>LEGO Product Inquiry</h1>
        <p class="subtitle">Ask us about your favorite LEGO set</p>

        <form id="inquiryForm">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Enter your name" />
            <small class="error" id="nameError"></small>
          </div>

          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" />
            <small class="error" id="emailError"></small>
          </div>

          <div class="form-group">
            <label>LEGO Set Name</label>
            <input
              type="text"
              id="product"
              placeholder="Example: LEGO Technic Ferrari"
            />
            <small class="error" id="productError"></small>
          </div>

          <div class="form-group">
            <label>Set Number</label>
            <input type="text" id="setNumber" placeholder="Example: 42143" />
          </div>

          <div class="form-group">
            <label>Your Message</label>
            <textarea
              id="message"
              rows="4"
              placeholder="Write your inquiry here..."
            ></textarea>
            <small class="error" id="messageError"></small>
          </div>

          <button type="submit">Send Inquiry</button>
        </form>

        <div class="success-message" id="successMessage">
          Your inquiry has been submitted successfully!
        </div>
      </div>
    </div>



    <div class="table-section">
        <h2>Submitted Inquiries</h2>
        <table id="inquiryTable">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Product</th>
              <th>Set No</th>
              <th>Message</th>
            </tr>
          </thead>
          <tbody>
            
          </tbody>
        </table>
      </div>

    </div>
  </div>

    <script src="inquiry-form.js"></script>
  </body>
</html>
