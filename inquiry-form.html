                        <a href=""

                                src="https://assets.lego.com/icons/v7.7.0/brick-one-by-one-side-blue.svg"
                                alt=""
                            />

                        >
                    </div>
                </div>
            </header>
        </div>
        <nav class="main-nav">
            <div class="main-nav-inner">
                <div class="nav-left">
                    <a href="/index.html" class="lego-logo">
                        <img src="/img/brand-lego.png" alt="LEGO" />
                    </a>

                    <ul class="nav-links">
                        <li><a href="/index.html">HOME</a></li>
                        <li><a href="/About_Us.html">ABOUT</a></li>
                        <li>
                            <a
                                href="/sale.html"
                                class="sale-link"
                                style="
                                    color: #e3000b;

                                    padding: 14px 19px 14px 19px;
                                    border: 2px solid #000;

                                "
                                >SALE</a

                        <li>
              <a
                href="/inquiry-form.html"
                class="sale-link"
                style="
                  color: #e3000b;
                  background: dodgerblue;
                  padding: 14px 19px 14px 19px;
                  border: 2px solid #000;
                  border-radius: 5px;
                "
                ><span style="color: white">Send Inquiry</span></a
              >
            </li>
                    </ul>
                </div>

                <div class="nav-icons">
                    <a href="#"><img src="/img/heart.png" alt="" /></a>
                    <a href="#" id="icon-cart"
                        ><img
                            src="https://lego.bricksmegastore.com/cdn/shop/t/838/assets/icon-bag_small.png?v=137789470096002749121767140447"

        </nav>
        <br><br><br><br>
    <div class="container">
      <div class="form-card">
        <h1>LEGO Product Inquiry</h1>
        <p class="subtitle">Ask us about your favorite LEGO set</p>

        <form id="inquiryForm">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Enter your name" />
            <small class="error" id="nameError"></small>
          </div>

          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" />
            <small class="error" id="emailError"></small>
          </div>

          <div class="form-group">
            <label>LEGO Set Name</label>
            <input
              type="text"
              id="product"
              placeholder="Example: LEGO Technic Ferrari"
            />
            <small class="error" id="productError"></small>
          </div>

          <div class="form-group">
            <label>Set Prices</label>
            <input type="text" id="setPrice" placeholder="Example: $564" />
          </div>

          <div class="form-group">
            <label>Your Message</label>
            <textarea
              id="message"
              rows="4"
              placeholder="Write your inquiry here..."
            ></textarea>
            <small class="error" id="messageError"></small>
          </div>

          <button type="submit">Send Inquiry</button>
        </form>

        <div class="success-message" id="successMessage">
          Your inquiry has been submitted successfully!
        </div>
      </div>
    </div>



    <div class="table-section">
        <h2>Submitted Inquiries</h2>
        <table id="inquiryTable">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Product</th>
              <th>Set Prices</th>
              <th>Message</th>
            </tr>
          </thead>
          <tbody>
            
          </tbody>
        </table>
      </div>

    </div>
  </div>

    <script src="js/inquiry-form.js"></script>
  </body>
</html>
